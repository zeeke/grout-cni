version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          severity: warning
    misspell:
      locale: US
      # "ageing" is grout's API field naming (gr_l2.h: ageing_time,
      # GR_BRIDGE_*_AGEING); keep it when referring to those.
      ignore-rules:
        - ageing

run:
  timeout: 5m
  tests: true

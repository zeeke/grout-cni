name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy && git diff --exit-code

      - name: Build
        run: make build

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # The groutapi client speaks grout API v3 (GR_API_VERSION), which is
        # the 0.16.x line; older grout releases reject the hello handshake.
        # Add newer 0.16.z (or future v3-compatible) tags here as they ship.
        grout-version: ["0.16.0", "0.16.1"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy && git diff --exit-code

      - name: E2E tests (grout ${{ matrix.grout-version }})
        run: make e2e
        env:
          GROUT_VERSION: ${{ matrix.grout-version }}

  kind-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # See the e2e job: limited to grout API v3 (0.16.x) releases, which
        # are the versions the groutapi client can handshake with.
        grout-version: ["0.16.0", "0.16.1"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy && git diff --exit-code

      - name: Create kind cluster with custom node image
        run: make kind-setup

      - name: Kind e2e tests (grout ${{ matrix.grout-version }})
        run: make kind-e2e
        env:
          GROUT_VERSION: ${{ matrix.grout-version }}
